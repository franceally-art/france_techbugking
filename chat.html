<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Chat Application</title>\n    <link rel=\"stylesheet\" href=\"style.css\">\n    <script src=\"https://code.jquery.com/jquery-3.6.0.min.js\"></script>\n    <script src=\"https://cdn.socket.io/4.0.0/socket.io.min.js\"></script>\n</head>\n<body>\n    <div id=\"chat-rooms\">\n        <h2>Chat Rooms</h2>\n        <ul id=\"rooms-list\"></ul>\n        <input type=\"text\" id=\"room-name\" placeholder=\"Enter room name\">\n        <button id=\"create-room\">Create Room</button>\n    </div>\n    <div id=\"private-chats\">\n        <h2>Private Chats</h2>\n        <input type=\"text\" id=\"private-chat-user\" placeholder=\"User name\">\n        <button id=\"start-private-chat\">Start Private Chat</button>\n    </div>\n    <div id=\"chat-window\">\n        <textarea id=\"messages\" readonly></textarea>\n        <input type=\"text\" id=\"message-input\" placeholder=\"Type a message...\">\n        <button id=\"send-message\">Send</button>\n    </div>\n    <script>\n        const socket = io('http://localhost:3000');\n        const messages = $('#messages');\n        const roomsList = $('#rooms-list');\n        const roomNameInput = $('#room-name');\n        const privateChatUserInput = $('#private-chat-user');\n        const messageInput = $('#message-input');\n\n        $(document).on('click', '#create-room', function() {\n            const roomName = roomNameInput.val();\n            socket.emit('create-room', roomName);\n            roomNameInput.val('');\n        });\n\n        $(document).on('click', '#start-private-chat', function() {\n            const userName = privateChatUserInput.val();\n            socket.emit('start-private-chat', userName);\n            privateChatUserInput.val('');\n        });\n\n        $(document).on('click', '#send-message', function() {\n            const message = messageInput.val();\n            socket.emit('send-message', message);\n            messageInput.val('');\n        });\n\n        socket.on('receive-message', function(message) {\n            messages.append(message + '\\n');\n        });\n    </script>\n</body>\n</html>\n
